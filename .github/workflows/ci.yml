name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[test]"

      - name: Lint with ruff
        run: uv run ruff check src/ tests/ api/

      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short --ignore=tests/integration -m "not slow"
