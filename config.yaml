  duration_seconds: 60       # Max short length
  fps: 30
  colors:
    background: "#0d0d0d"
    hard_slur: "#ff1744"      # Neon Red
    soft_slur: "#ffea00"      # Neon Yellow
    f_bomb: "#d500f9"         # Neon Purple
